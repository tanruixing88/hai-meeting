<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HAI Meeting</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>HAI Meeting</h1>
          <p id="current-page">正在检测当前页面...</p>
        </div>
        <button id="refresh-button" type="button" title="刷新状态" aria-label="刷新状态">↻</button>
      </header>

      <section class="panel" aria-labelledby="provider-status-title">
        <h2 id="provider-status-title">模型页面状态</h2>
        <div id="provider-list" class="provider-list"></div>
      </section>

      <section class="panel" aria-labelledby="chatgpt-run-title">
        <h2 id="chatgpt-run-title">ChatGPT 单模型测试</h2>
        <form id="chatgpt-form" class="prompt-form">
          <textarea
            id="chatgpt-prompt"
            rows="5"
            placeholder="输入要发送给 ChatGPT 的内容"
          ></textarea>
          <button id="send-chatgpt-button" class="primary-button" type="submit">发送到 ChatGPT</button>
        </form>
        <div id="chatgpt-result" class="result" aria-live="polite">等待发送</div>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
