<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HAI Meeting</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>HAI Meeting</h1>
          <p id="current-page">正在检测当前页面...</p>
        </div>
        <button id="refresh-button" type="button" title="刷新状态" aria-label="刷新状态">↻</button>
      </header>

      <section class="panel" aria-labelledby="provider-status-title">
        <h2 id="provider-status-title">模型页面状态</h2>
        <div id="provider-list" class="provider-list"></div>
      </section>

      <section class="panel" aria-labelledby="all-models-run-title">
        <h2 id="all-models-run-title">发起一轮 AI 讨论</h2>
        <form id="all-models-form" class="prompt-form">
          <textarea
            id="all-models-prompt"
            rows="6"
            placeholder="输入本轮讨论议题，同时发送给 ChatGPT、Gemini、DeepSeek"
          ></textarea>
          <button id="send-all-models-button" class="primary-button" type="submit">发起讨论</button>
        </form>
        <div class="all-results" aria-live="polite">
          <article class="model-result">
            <strong>ChatGPT</strong>
            <div id="all-chatgpt-result" class="result compact">等待发送</div>
          </article>
          <article class="model-result">
            <strong>Gemini</strong>
            <div id="all-gemini-result" class="result compact">等待发送</div>
          </article>
          <article class="model-result">
            <strong>DeepSeek</strong>
            <div id="all-deepseek-result" class="result compact">等待发送</div>
          </article>
        </div>
      </section>

      <section class="panel" aria-labelledby="discussion-summary-title">
        <div class="panel-heading">
          <h2 id="discussion-summary-title">本轮主持总结</h2>
          <div class="button-row">
            <button id="summarize-discussion-button" class="secondary-button" type="button">生成总结</button>
            <button id="copy-summary-button" class="secondary-button" type="button">复制总结</button>
          </div>
        </div>
        <div id="discussion-summary-result" class="result" aria-live="polite">等待生成本轮总结</div>
      </section>

      <section class="panel" aria-labelledby="chatgpt-run-title">
        <h2 id="chatgpt-run-title">ChatGPT 单模型测试</h2>
        <form id="chatgpt-form" class="prompt-form">
          <textarea
            id="chatgpt-prompt"
            rows="5"
            placeholder="输入要发送给 ChatGPT 的内容"
          ></textarea>
          <button id="send-chatgpt-button" class="primary-button" type="submit">发送到 ChatGPT</button>
        </form>
        <div id="chatgpt-result" class="result" aria-live="polite">等待发送</div>
      </section>

      <section class="panel" aria-labelledby="gemini-run-title">
        <h2 id="gemini-run-title">Gemini 单模型测试</h2>
        <form id="gemini-form" class="prompt-form">
          <textarea
            id="gemini-prompt"
            rows="5"
            placeholder="输入要发送给 Gemini 的内容"
          ></textarea>
          <button id="send-gemini-button" class="primary-button" type="submit">发送到 Gemini</button>
        </form>
        <div id="gemini-result" class="result" aria-live="polite">等待发送</div>
      </section>

      <section class="panel" aria-labelledby="deepseek-run-title">
        <h2 id="deepseek-run-title">DeepSeek 单模型测试</h2>
        <form id="deepseek-form" class="prompt-form">
          <textarea
            id="deepseek-prompt"
            rows="5"
            placeholder="输入要发送给 DeepSeek 的内容"
          ></textarea>
          <button id="send-deepseek-button" class="primary-button" type="submit">发送到 DeepSeek</button>
        </form>
        <div id="deepseek-result" class="result" aria-live="polite">等待发送</div>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
